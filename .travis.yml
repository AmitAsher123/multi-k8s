dist: focal
sudo: required
services:
  - docker

env:
  global:
    - SHA=$(git rev-parse HEAD)
    - CLOUDSDK_CORE_DISABLE_PROMPTS=1

before_install:
  # 1. Decrypt the Google Cloud Service Account key
  - openssl aes-256-cbc -K $encrypted_9f3b5599b056_key -iv $encrypted_9f3b5599b056_iv -in service-account.json.enc -out service-account.json -d
  # 2. Install Google Cloud SDK
  - curl https://sdk.cloud.google.com | bash > /dev/null;
  - source $HOME/google-cloud-sdk/path.bash.inc
  # 3. Update kubectl and authenticate
  - gcloud components update kubectl
  - gcloud auth activate-service-account --key-file service-account.json
  # 4. Configure GCP project and cluster
  - gcloud config set project cloud-run-pipeline-lab
  - gcloud config set compute/region us-central1
  - gcloud container clusters get-credentials multi-cluster
  # 5. Login to Docker
  - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
  # 6. Build the test image
  - docker build -t stephengrider/react-test -f ./client/Dockerfile.dev ./client

script:
  # Run tests (Added the '-' before the 'e' in '-e CI=true')
  - docker run -e CI=true stephengrider/react-test npm test

deploy:
  provider: script
  script: bash ./deploy.sh
  on:
    branch: master
    
